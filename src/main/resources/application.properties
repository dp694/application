server.port=${PORT:8080}
spring.application.name=golds-gym-backend

# Database URL with SSL enforcement parameters appended
spring.datasource.url=${JDBC_DATABASE_URL}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=40000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=2

# JPA & Hibernate Lifecycle Configuration
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
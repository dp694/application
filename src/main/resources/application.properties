# Dynamically bind to Render's container port environment variable
server.port=${PORT:8080}
spring.application.name=golds-gym-backend

# Database connection parsing configuration
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Patience Settings
spring.datasource.hikari.connection-timeout=40000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA & Hibernate Lifecycle Handling
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true